questions_test:
  - id: Q21
    nl_query: "Mostra la topologia di rete (grafo) di tutti gli apparecchi nel lotto 'Fondo Errano 2024 T0' che hanno trasmesso dati sulla proprietà 'dripper'."

  - id: Q22
    nl_query: "Restituisci esclusivamente il nodo del sensore che in assoluto ha registrato il valore più basso di umidità del suolo ('soilMoisture') nell'intera storia del database."

  - id: Q23
    nl_query: "Restituisci il grafo che mostra le aziende agricole (AgriFarm) che possiedono sensori che hanno segnalato un valore di 'soilMoisture' inferiore a -500."

  - id: Q24
    nl_query: "Genera la rete dei lotti agricoli coltivati a 'kiwi' e mostra tutti i dispositivi e sensori ad essi collegati."

  - id: Q25
    nl_query: "Mostra il sotto-grafo dei dispositivi che sono particolarmente attivi, ovvero che hanno registrato più di 100 eventi 'dripper' totali."

  - id: Q26
    nl_query: "Visualizza l'albero dei dispositivi nel lotto 'Fondo Errano 2024 T1' che nel mese di Agosto 2024 hanno avuto un livello di umidità del terreno ('soilMoisture') sotto il 15."

  - id: Q27
    nl_query: "Restituisci il grafo di tutti i sensori finali collegati al dispositivo principale il cui ID è 'urn:ngsi-ld:Device:unibo:2d6b0e0c8c57f720c48fcb40563b4401'."

  - id: Q28
    nl_query: "Estrai i nodi dei sensori di umidità la cui media delle misurazioni storiche ('soilMoisture') risulta essere inferiore a 40."

  - id: Q29
    nl_query: "Mostra il grafo dei dispositivi (nodi padre) presenti nell'azienda 'ZESPRI' che non hanno alcun sensore finale collegato a loro tramite hasDevice."

  - id: Q30
    nl_query: "Restituisci il percorso topologico dal lotto al sensore per tutti quei dispositivi che hanno registrato, nella loro storia, almeno uno tra un valore di umidità del suolo inferiore a 20 oppure un evento di irrigazione con valore superiore a 0."