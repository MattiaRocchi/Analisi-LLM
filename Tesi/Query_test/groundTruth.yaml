- id: Q21
    nl_query: "Mostra la topologia di rete (grafo) di tutti gli apparecchi nel lotto 'Fondo Errano 2024 T0' che hanno trasmesso dati sulla proprietà 'dripper'."
    query: |
        WITH active_drippers AS (
            SELECT DISTINCT m.device_id
            FROM public.measurements m
            WHERE m.controlled_property = 'dripper'
        )
        SELECT * FROM cypher('agri_graph', $$
            MATCH path1 = (p:AgriParcel {name: 'Fondo Errano 2024 T0'})<-[:belongsTo]-(d:Device)
            OPTIONAL MATCH path2 = (d)-[:hasDevice]->(d2:Device)
            RETURN path1, path2, d, d2
        $$) AS (path1 agtype, path2 agtype, d agtype, d2 agtype)
        WHERE d::json -> 'properties' ->> 'id' IN (SELECT device_id FROM active_drippers)
            OR d2::json -> 'properties' ->> 'id' IN (SELECT device_id FROM active_drippers);
  - id: Q22
    nl_query: "Restituisci esclusivamente il nodo del sensore che in assoluto ha registrato il valore più basso di umidità del suolo ('soilMoisture') nell'intera storia del database."
    query: |
        WITH lowest_moisture AS (
            SELECT m.device_id, MIN(m.value) AS min_value
            FROM public.measurements m
            WHERE m.controlled_property = 'soilMoisture'
            GROUP BY m.device_id
            ORDER BY min_value ASC
            LIMIT 1
        )
        SELECT * FROM cypher('agri_graph', $$
            MATCH (d:Device)
            RETURN d
        $$) AS (d agtype)
        WHERE d::json -> 'properties' ->> 'id' IN (SELECT device_id FROM lowest_moisture);

  - id: Q23
    nl_query: "Genera la rete delle aziende agricole (AgriFarm) assieme ai relativi sensori che hanno segnalato un valore di 'soilMoisture' inferiore a -500."
    query: |
        WITH critical_moisture AS (
            SELECT DISTINCT m.device_id
            FROM public.measurements m
            WHERE m.controlled_property = 'soilMoisture' AND m.value < -500
        )
        SELECT * FROM cypher('agri_graph', $$
            MATCH path = (f:AgriFarm)<-[:belongsTo]-(p:AgriParcel)<-[:belongsTo]-(d:Device)-[:hasDevice]->(d2:Device)
            RETURN path, f, p, d, d2
        $$) AS (graph_path agtype, f agtype, p agtype, d agtype, d2 agtype)
        WHERE d::json -> 'properties' ->> 'id' IN (SELECT device_id FROM critical_moisture)
            OR d2::json -> 'properties' ->> 'id' IN (SELECT device_id FROM critical_moisture);
    
  - id: Q24
    nl_query: "Visualizza i lotti agricoli coltivati a kiwi portandoti dietro tutti i dispositivi e i sensori ad essi collegati."
    query: |
        SELECT * FROM cypher('agri_graph', $$
            MATCH path1 = (p:AgriParcel)<-[:belongsTo]-(d:Device)
            OPTIONAL MATCH path2 = (d)-[:hasDevice]->(d2:Device)
            WHERE toLower(p.colture) CONTAINS toLower('kiwi')
            RETURN path1, path2
        $$) AS (path1 agtype, path2 agtype);

  - id: Q25
    nl_query: "Trova i dispositivi particolarmente attivi, ovvero quelli che hanno registrato più di 100 eventi 'dripper' totali."
    query: |
        WITH active_devices AS (
            SELECT m.device_id
            FROM public.measurements m
            WHERE m.controlled_property = 'dripper'
            GROUP BY m.device_id
            HAVING COUNT(*) > 100
        )
        SELECT * FROM cypher('agri_graph', $$
            MATCH path = (p:AgriParcel)<-[:belongsTo]-(d:Device)
            RETURN path, d
        $$) AS (graph_path agtype, d agtype)
        WHERE d::json -> 'properties' ->> 'id' IN (SELECT device_id FROM active_devices);

  - id: Q26
    nl_query: "Quali dispositivi nel lotto 'Fondo Errano 2024 T1' hanno registrato un livello di umidità del terreno ('soilMoisture') sotto il 15 nel mese di Agosto 2024?"
    query: |
        WITH critical_moisture AS (
            SELECT DISTINCT m.device_id
            FROM public.measurements m
            WHERE m.controlled_property = 'soilMoisture'
            AND m.value < 15
            AND m.timestamp >= '2024-08-01' AND m.timestamp < '2024-09-01'
        )
        SELECT * FROM cypher('agri_graph', $$
            MATCH path = (p:AgriParcel {name: 'Fondo Errano 2024 T1'})<-[:belongsTo]-(d:Device)-[:hasDevice]->(d2:Device)
            RETURN path, d, d2
        $$) AS (graph_path agtype, d agtype, d2 agtype)
        WHERE d::json -> 'properties' ->> 'id' IN (SELECT device_id FROM critical_moisture)
            OR d2::json -> 'properties' ->> 'id' IN (SELECT device_id FROM critical_moisture);

  - id: Q27
    nl_query: "Elenca i sensori finali collegati al dispositivo principale il cui ID è 'urn:ngsi-ld:Device:unibo:2d6b0e0c8c57f720c48fcb40563b4401'."
    query: |
        SELECT * FROM cypher('agri_graph', $$
            MATCH (d:Device {id: 'urn:ngsi-ld:Device:unibo:2d6b0e0c8c57f720c48fcb40563b4401'})-[:hasDevice]->(d2:Device)
            RETURN d2
        $$) AS (d2 agtype);

  - id: Q28
    nl_query: "Quali sono i sensori di umidità la cui media delle misurazioni storiche ('soilMoisture') risulta essere inferiore a 40?"
    query: |
        WITH avg_moisture AS (
            SELECT m.device_id
            FROM public.measurements m
            WHERE m.controlled_property = 'soilMoisture'
            GROUP BY m.device_id
            HAVING AVG(m.value) < 40
        )
        SELECT * FROM cypher('agri_graph', $$
            MATCH (d:Device)-[:hasDevice]->(d2:Device)
            WHERE 'soilMoisture' IN d2.controlledProperty
            RETURN d2
        $$) AS (d2 agtype)
        WHERE d2::json -> 'properties' ->> 'id' IN (SELECT device_id FROM avg_moisture);

  - id: Q29
    nl_query: "Ci sono dispositivi principali nell'azienda 'ZESPRI' a cui non è ancora stato collegato alcun sensore finale?"
    query: |
        SELECT * FROM cypher('agri_graph', $$
            MATCH (f:AgriFarm {name: 'ZESPRI AZ. AGR. DALLE FABBRICHE ANDREA'})<-[:belongsTo]-(p:AgriParcel)<-[:belongsTo]-(d:Device)
            WHERE NOT EXISTS ((d)-[:hasDevice]->(:Device))
            RETURN d
        $$) AS (d agtype);

  - id: Q30
    nl_query: "Individua i dispositivi che, nella loro storia, hanno registrato sia un valore di 'soilMoisture' inferiore a 20, sia almeno un evento 'dripper' maggiore di 0. Traccia il collegamento partendo dal loro lotto di origine."
    query: |
      WITH multi_task_devices AS (
          SELECT device_id FROM public.measurements WHERE controlled_property = 'soilMoisture' AND value < 20
          INTERSECT
          SELECT device_id FROM public.measurements WHERE controlled_property = 'dripper' AND value > 0
      )
      SELECT * FROM cypher('agri_graph', $$
          MATCH path1 = (p:AgriParcel)<-[:belongsTo]-(d:Device)
          OPTIONAL MATCH path2 = (d)-[:hasDevice]->(d2:Device)
          RETURN path1, path2
      $$) AS (path1 agtype, path2 agtype)
      WHERE (path1::json -> 'nodes' -> 1 -> 'properties' ->> 'id' IN (SELECT device_id FROM multi_task_devices))
         OR (path2::json -> 'nodes' -> 2 -> 'properties' ->> 'id' IN (SELECT device_id FROM multi_task_devices));