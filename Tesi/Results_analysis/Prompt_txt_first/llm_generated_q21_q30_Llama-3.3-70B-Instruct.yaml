- id: Q29
  nl_query: Mostra il grafo dei dispositivi (nodi padre) presenti nell'azienda 'ZESPRI'
    che non hanno alcun sensore finale collegato a loro tramite hasDevice.
  query: |-
    SELECT * FROM cypher('agri_graph', $$
      MATCH path = (f:AgriFarm)-[:belongsTo*]->(p:AgriParcel)<-[:belongsTo]-(d:Device)
      WHERE f.name = 'ZESPRI' AND NOT EXISTS ((d)-[:hasDevice]->(:Device))
      RETURN path
    $$) AS (path agtype);
- id: Q30
  nl_query: Restituisci il percorso topologico dal lotto al sensore per tutti quei
    dispositivi che hanno registrato, nella loro storia, sia un valore di 'soilMoisture'
    inferiore a 20, sia almeno un evento 'dripper' con valore superiore a 0.
  query: |-
    WITH critical_sensors AS (
      SELECT DISTINCT m1.device_id
      FROM public.measurements m1
      WHERE m1.controlled_property = 'soilMoisture' AND m1.value < 20
      INTERSECT
      SELECT DISTINCT m2.device_id
      FROM public.measurements m2
      WHERE m2.controlled_property = 'dripper' AND m2.value > 0
    )
    SELECT * FROM cypher('agri_graph', $$
      MATCH path = (p:AgriParcel)<-[:belongsTo]-(d:Device)
      OPTIONAL MATCH (d)-[:hasDevice]->(d2:Device)
      RETURN path, d, d2
    $$) AS (graph_path agtype, d agtype, d2 agtype)
    WHERE d::json -> 'properties' ->> 'id' IN (SELECT device_id FROM critical_sensors)
    OR d2::json -> 'properties' ->> 'id' IN (SELECT device_id FROM critical_sensors);
